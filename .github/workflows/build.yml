name: Computercraft

on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - python: "3.14.4"
          - python: "3.10.11"
          - python: "3.8.16"

    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      - name: Test with pytest
        run: |
          pytest -vv
